workflows:
  ios-release:
    name: AstroPillar iOS Release
    max_build_duration: 60
    instance_type: mac_mini_m2

    integrations:
      app_store_connect: PilLAB

    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.pillab.astropillar
      vars:
        BUNDLE_ID: com.pillab.astropillar
        XCODE_PROJECT: ios/App/App.xcodeproj
        XCODE_SCHEME: App
      node: 22.14.0

    scripts:
      - name: Install dependencies
        script: npm install

      - name: Capacitor sync
        script: npx cap sync ios

      - name: Set build number
        script: |
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $BUILD_NUMBER" ios/App/App/Info.plist
          /usr/libexec/PlistBuddy -c "Print :CFBundleVersion" ios/App/App/Info.plist
          echo "CFBundleVersion set to $BUILD_NUMBER"

      - name: Build iOS IPA
        script: |
          xcode-project use-profiles
          xcodebuild \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -archivePath build/AstroPillar.xcarchive \
            CURRENT_PROJECT_VERSION=$BUILD_NUMBER \
            MARKETING_VERSION=1.0 \
            archive
          xcodebuild \
            -exportArchive \
            -archivePath build/AstroPillar.xcarchive \
            -exportOptionsPlist /Users/builder/export_options.plist \
            -exportPath build/

    artifacts:
      - build/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
